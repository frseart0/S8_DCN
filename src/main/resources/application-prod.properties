# ===== Perfil prod: Oracle Cloud Autonomous Database =====
# ORACLE_DB_URL es el alias TNS del wallet (ej: guiasdb_high).
# El wallet debe estar montado en /app/wallet (ver docs/04-oracle-cloud.md).
spring.datasource.url=jdbc:oracle:thin:@${ORACLE_DB_URL}?TNS_ADMIN=${ORACLE_WALLET_DIR:/app/wallet}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=${ORACLE_DB_USER}
spring.datasource.password=${ORACLE_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.show-sql=false

# Pool acotado: las Autonomous DB Always Free limitan las sesiones
spring.datasource.hikari.maximum-pool-size=5
