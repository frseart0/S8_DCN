spring.application.name=ms-administracion-archivos
server.port=8080

# ===== Logs AWS =====
logging.level.software.amazon.awssdk=INFO
logging.level.io.awspring.cloud=INFO

# ===== EFS (almacenamiento temporal) =====
efs.path=${EFS_PATH:/app/efs}

# ===== S3 =====
aws.s3.bucket=${S3_BUCKET:guias-despacho-bucket}

# ===== Subida de archivos =====
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ===== Seguridad: Microsoft Entra ID =====
# El issuer valida los JWT emitidos por el tenant. AZURE_TENANT_ID se define
# como variable de entorno (ver docs/03-microsoft-entra-id.md).
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID:common}/v2.0
azure.client-id=${AZURE_CLIENT_ID:}

# ===== RabbitMQ =====
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ===== Base de datos (perfil default: H2 en memoria para desarrollo local) =====
# En produccion se usa el perfil "prod" con Oracle Cloud (application-prod.properties)
spring.datasource.url=jdbc:h2:mem:guias;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
