name: CI/CD - Build, Push y Deploy a EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ms-administracion-archivos

jobs:

  build-and-push:
    name: Build Maven + Push a Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compilar y ejecutar tests
        run: mvn -B clean verify

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push de la imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy en EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Copiar docker-compose.yml a la EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.yml
          target: ~/app/

      - name: Desplegar con docker compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app

            # Genera el .env que consume docker-compose.yml
            cat > .env <<'EOF'
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            SPRING_PROFILES_ACTIVE=prod
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=us-east-1
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
            AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            ORACLE_DB_URL=${{ secrets.ORACLE_DB_URL }}
            ORACLE_DB_USER=${{ secrets.ORACLE_DB_USER }}
            ORACLE_DB_PASSWORD=${{ secrets.ORACLE_DB_PASSWORD }}
            EFS_MOUNT=/mnt/efs
            ORACLE_WALLET_PATH=./wallet
            EOF

            # Descomprime el wallet de Oracle si viene como secreto (base64)
            if [ -n "${{ secrets.ORACLE_WALLET_B64 }}" ]; then
              mkdir -p ~/app/wallet
              echo "${{ secrets.ORACLE_WALLET_B64 }}" | base64 -d > ~/app/wallet.zip
              unzip -o ~/app/wallet.zip -d ~/app/wallet
              rm ~/app/wallet.zip
            fi

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
